# GitHub Pages deploy (ARCHITECTURE.md §18). Gate order mirrors §19; build output in dist/ is
# published via the Actions Pages artifact (no Jekyll, no gh-pages branch). Vite `base` is
# '/smartcrop-pdf-web/' (vite.config.ts) so all asset URLs resolve under the project-page subpath.
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit && npx tsc --noEmit -p tsconfig.worker.json
      - run: npx eslint src
      - run: npx vitest run --coverage
      - run: npx playwright install --with-deps chromium firefox
      - run: npx playwright test
      - run: npx vite build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
