# GitHub Pages deploy (ARCHITECTURE.md §18). dist/ is published via the Actions Pages artifact
# (no Jekyll, no gh-pages branch). Vite `base` is '/smartcrop-pdf-web/' (vite.config.ts) so all
# asset URLs resolve under the project-page subpath.
#
# One-time repo setup (Settings): Pages → Source = "GitHub Actions"; Actions → General → Workflow
# permissions = "Read and write" (lets configure-pages enable Pages automatically).
#
# The site deploy depends ONLY on typecheck + unit tests + build, so a flaky browser test never
# blocks publishing. The Playwright e2e runs as a separate, parallel quality job.
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false   # never cancel an in-flight deploy

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit && npx tsc --noEmit -p tsconfig.worker.json
      - run: npx eslint src
      - run: npx vitest run --coverage
      - run: npx vite build
        env:
          VITE_BASE: /smartcrop-pdf-web/   # GitHub Pages project-page subpath (Cloudflare uses '/')
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  # Quality gate — runs in parallel; does NOT block the deploy above.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium firefox
      - run: npx playwright test
